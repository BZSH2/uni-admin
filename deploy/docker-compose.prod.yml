services:
  app:
    image: nginx:1.27-alpine
    container_name: ${CONTAINER_NAME:-uni-admin}
    restart: unless-stopped
    ports:
      - '${PORT_MAPPING:-127.0.0.1:25003:80}'
    volumes:
      - '${DEPLOY_PATH:?DEPLOY_PATH is required}/current:/usr/share/nginx/html:ro'
      - '${DEPLOY_PATH:?DEPLOY_PATH is required}/deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro'
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null "http://127.0.0.1/healthz" || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
