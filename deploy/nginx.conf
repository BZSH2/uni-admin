server {
  listen 80;
  server_name m.bzsh.fun style.h5.alish;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location ~* \.(?:css|js|mjs|json|map|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf)$ {
    expires 7d;
    add_header Cache-Control 'public, max-age=604800, immutable';
    try_files $uri =404;
  }

  # 当前 uni-admin 的 H5 构建中，/login 与 /setting 只写进了 meta.alias，
  # 不是 Vue Router 可直接匹配的真实路由；真实地址仍然是 /pages/**/index。
  # 因此不能再把 /pages/** 重定向到短地址，否则前端会命中不到路由而白屏。
  # 这里仅保留“短地址 -> 真实路由”的兼容跳转。
  location = /dashboard {
    return 302 /;
  }

  location = /login {
    return 302 /pages/login/index$is_args$args;
  }

  location = /setting {
    return 302 /pages/setting/index$is_args$args;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
