server {
  listen 80;
  server_name style.h5.alish;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location ~* \.(?:css|js|mjs|json|map|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf)$ {
    expires 7d;
    add_header Cache-Control 'public, max-age=604800, immutable';
    try_files $uri =404;
  }

  # 兼容旧 H5 地址，统一把 /pages/**/index 跳转到 /**。
  location ~ ^/pages/(.+)/index$ {
    return 301 /$1$is_args$args;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
